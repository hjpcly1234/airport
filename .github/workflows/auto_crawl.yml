name: 自动更新auto_crawl JSON 数据

on:
  schedule:
    # 每天北京时间早上 6 点自动运行一次 (UTC 时间 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 支持你在 GitHub 网页上人肉手动点按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取最新代码
        uses: actions/checkout@v4

      - name: 🟢 初始化 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安装核心依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 🚀 执行精简版爬虫
        run: python py/crawl.py

      - name: 💾 将更新后的 JSON 自动推送到仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查文件是否有变动
          git add 日韩有码.json
          if git diff --staged --quiet; then
            echo "数据没有变化，跳过提交。"
          else
            git commit -m "自动更新：最新日韩有码数据列表"
            git push
          fi
